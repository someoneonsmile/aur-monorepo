name: update

on:
  schedule:
    - cron: "0 */6 * * *" # 每6小时检查一次
  workflow_dispatch:
    inputs:
      package:
        description: "只处理指定包（留空则处理全部）"
        required: false
        type: string
      force:
        description: "强制重新生成并推送，跳过 nvchecker 预检和版本比对"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    container:
      image: archlinux:latest
    steps:
      - name: Cache pacman packages
        uses: actions/cache@v4
        with:
          path: /var/cache/pacman/pkg
          key: pacman-${{ runner.os }}-${{ github.run_id }}
          restore-keys: pacman-${{ runner.os }}-

      - name: Install dependencies
        run: |
          set -euo pipefail
          pacman -Syu --noconfirm --needed \
            base-devel git devtools nvchecker openssh jq github-cli

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # rebase 需要完整历史

      - name: Setup SSH for AUR
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}

      - name: Sync packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/*.sh
          ./scripts/sync-all.sh "${{ inputs.package }}" "${{ inputs.force }}"
